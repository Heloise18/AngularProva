<div style="background-color: coral; width: 100%; height: 100vh; padding: 0; box-sizing: border-box; margin: 0; border: none; display: flex; align-items: center; justify-content: center; flex-direction: column;">
    <div style="background-color: rgb(252, 195, 175); width: 400px; height: 500PX; display: flex; align-items: center; flex-direction: column; justify-content: baseline; padding-top: 20px; gap: 10px;">
        <h1>Cadastrar</h1>
        <form action="get" [formGroup]="authForm">
     
            <label for=""> Numero de Telefone:</label>
            <app-input></app-input>

            <label for=""> Nome de usuario:</label>
            <app-input></app-input >

            <label for=""> Email:</label>
            <app-input formControlName="email"></app-input>

            <label for=""> Nascimento:</label>
            <app-input></app-input>

            <label for=""> Senha:</label>
            <app-input formControlName="password"></app-input>

            <div style="display: flex; gap: 30px; padding-top: 30px;">
                <app-button [title]="save"></app-button>
            </div>
            
        </form>
    </div>
</div>
